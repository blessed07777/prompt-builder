<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI TREND — Prompt Builder</title>
<style>
/* ══ RESET ══ */
*{margin:0;padding:0;box-sizing:border-box}

/* ══ THEMES ══ */
[data-theme="dark"]{
  --bg:#09080f; --surface:#110f1e; --surface2:#0e0c1a; --surface3:#16132a;
  --border:#1f1c38; --border2:#2d2960;
  --text:#e2daff; --sub:#8b83bf; --muted:#4a4570;
  --shadow:rgba(0,0,0,.5);
}
[data-theme="light"]{
  --bg:#f0eeff; --surface:#ffffff; --surface2:#f8f6ff; --surface3:#ece8ff;
  --border:#ddd8f5; --border2:#c4bcf0;
  --text:#1a1235; --sub:#5a5290; --muted:#b0aad0;
  --shadow:rgba(104,91,199,.1);
}

:root{--purple:#685BC7;--green:#B5ED18;--red:#f04444;}

html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;
  display:flex;flex-direction:column;
  transition:background .3s,color .3s;
}

/* ══ HEADER ══ */
.hdr{
  flex-shrink:0;height:52px;padding:0 20px;
  display:flex;align-items:center;gap:14px;
  background:var(--surface);border-bottom:1.5px solid var(--border);
  transition:background .3s,border-color .3s;
  box-shadow:0 2px 12px var(--shadow);
  z-index:50;
}

/* logo */
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0;text-decoration:none}
.logo-icon{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,#685BC7,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;color:#fff;
  box-shadow:0 3px 10px rgba(104,91,199,.4);
}
.logo-name{font-size:15px;font-weight:900;letter-spacing:.05em;color:var(--text);transition:color .3s}
.logo-name b{color:#685BC7}

/* progress */
.hdr-prog{flex:1;display:flex;align-items:center;gap:10px;overflow:hidden}
.prog-pills{display:flex;gap:3px}
.prog-pill{
  width:22px;height:5px;border-radius:3px;
  background:var(--border);
  transition:background .3s,transform .2s;
}
.prog-pill.done{background:#685BC7}
.prog-pill.active{background:#B5ED18;transform:scaleY(1.4)}
.prog-label{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}

/* theme toggle */
.theme-btn{
  width:44px;height:24px;border-radius:12px;
  border:2px solid var(--border2);
  background:var(--surface3);cursor:pointer;
  display:flex;align-items:center;padding:2px;
  flex-shrink:0;transition:background .3s,border-color .3s;
}
.theme-ball{
  width:16px;height:16px;border-radius:50%;
  background:linear-gradient(135deg,#685BC7,#8b5cf6);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  font-size:9px;display:flex;align-items:center;justify-content:center;
}
[data-theme="dark"] .theme-ball{transform:translateX(20px)}
[data-theme="light"] .theme-ball{transform:translateX(0)}

/* gen button */
.gen-btn{
  padding:9px 20px;border-radius:22px;border:none;
  background:linear-gradient(135deg,#685BC7,#8b5cf6);
  color:#fff;font-size:13px;font-weight:800;
  cursor:pointer;flex-shrink:0;
  box-shadow:0 4px 16px rgba(104,91,199,.35);
  transition:transform .18s,box-shadow .18s,opacity .2s;
}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 7px 22px rgba(104,91,199,.5)}
.gen-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* ══ WORKSPACE ══ */
.workspace{flex:1;display:flex;overflow:hidden;min-height:0}

/* ══════════════════════════════════
   LEFT — SECTION BLOCKS
══════════════════════════════════ */
.left-col{
  width:50%;min-width:240px;flex-shrink:0;
  overflow-y:auto;padding:16px 14px 80px;
  display:flex;flex-direction:column;gap:10px;
}

/* ── SECTION BLOCK ── */
.sblock{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:14px;overflow:hidden;
  transition:border-color .2s,box-shadow .2s,background .3s;
}
.sblock:hover{border-color:var(--border2)}
.sblock.active{
  border-color:var(--accent,#685BC7);
  box-shadow:0 0 0 3px rgba(var(--acr,104,91,199),.1);
}
.sblock.filled{ border-left:4px solid var(--accent,#685BC7) }

/* block header strip */
.sblock-strip{
  padding:12px 14px;
  display:flex;align-items:center;gap:11px;
  cursor:pointer;user-select:none;
}
.sblock-num{
  width:26px;height:26px;border-radius:8px;flex-shrink:0;
  background:var(--surface3);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:var(--muted);
  transition:background .2s,color .2s;
}
.sblock.active .sblock-num{background:rgba(var(--acr,104,91,199),.15);color:var(--accent,#685BC7)}
.sblock.filled .sblock-num{background:rgba(var(--acr,104,91,199),.15);color:var(--accent,#685BC7)}
.sblock-icon{font-size:18px;flex-shrink:0}
.sblock-info{flex:1;min-width:0}
.sblock-name{font-size:13px;font-weight:800;color:var(--text);transition:color .3s}
.sblock-preview{
  font-size:11px;color:var(--muted);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  max-width:200px;margin-top:1px;transition:color .3s;
}
.sblock.filled .sblock-preview{color:var(--accent,#685BC7)}
.sblock-check{
  width:20px;height:20px;border-radius:50%;
  border:2px solid var(--border2);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:transparent;
  transition:all .2s;
}
.sblock.filled .sblock-check{
  background:var(--accent,#685BC7);
  border-color:var(--accent,#685BC7);
  color:#fff;
}
.sblock-arr{color:var(--muted);font-size:10px;transition:transform .22s;margin-left:2px;flex-shrink:0}
.sblock-arr.open{transform:rotate(180deg)}

/* block body */
.sblock-body{display:none;padding:0 14px 14px}
.sblock-body.open{display:block}

.sblock-tip{
  font-size:12px;color:var(--sub);line-height:1.6;
  padding:9px 12px;border-radius:9px;
  background:var(--surface3);
  border-left:3px solid var(--accent,#685BC7);
  margin-bottom:10px;
  transition:background .3s,color .3s;
}
.sblock-example{
  font-size:11px;color:var(--muted);
  font-style:italic;margin-top:4px;
}

.sblock-ta{
  width:100%;padding:11px 13px;
  background:var(--surface2);
  border:1.5px solid var(--border);border-radius:10px;
  color:var(--text);font-size:13px;font-family:inherit;
  outline:none;resize:none;line-height:1.65;min-height:88px;
  transition:border-color .2s,background .3s,color .3s,box-shadow .2s;
}
.sblock-ta:focus{
  border-color:var(--accent,#685BC7);
  box-shadow:0 0 0 3px rgba(var(--acr,104,91,199),.1);
}
.sblock-ta::placeholder{color:var(--muted);font-size:12px;font-style:italic}

/* ══════════════════════════════════
   DRAG DIVIDER
══════════════════════════════════ */
.divider{
  width:20px;flex-shrink:0;
  cursor:col-resize;position:relative;z-index:20;
  display:flex;align-items:center;justify-content:center;
}
.div-track{
  position:absolute;inset:0;left:8px;width:4px;
  background:var(--border);border-radius:2px;
  transition:background .2s;pointer-events:none;
}
.divider:hover .div-track,
.divider.dragging .div-track{background:#685BC7}

.div-pill{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.88);
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:20px;padding:10px 5px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  box-shadow:0 6px 24px var(--shadow);
  opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s,border-color .2s;
}
.divider:hover .div-pill,
.divider.dragging .div-pill{
  opacity:1;transform:translate(-50%,-50%) scale(1);
  pointer-events:all;border-color:#685BC7;
}
.div-btn{
  width:22px;height:22px;border:none;border-radius:6px;
  background:rgba(104,91,199,.12);color:#685BC7;
  cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.div-btn:hover{background:rgba(104,91,199,.28)}
.div-dots{
  width:4px;height:24px;
  background:repeating-linear-gradient(var(--border2) 0 3px,transparent 3px 6px);
  border-radius:2px;
}

/* ══════════════════════════════════
   RIGHT — WIREFRAME PREVIEW
══════════════════════════════════ */
.right-col{
  flex:1;min-width:200px;display:flex;flex-direction:column;
  overflow:hidden;
  border-left:1.5px solid var(--border);
  background:var(--bg);
  transition:background .3s,border-color .3s;
}

.pv-bar{
  flex-shrink:0;height:38px;padding:0 14px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1.5px solid var(--border);
  transition:border-color .3s;
}
.pv-bar-l{display:flex;align-items:center;gap:7px}
.pv-live{
  width:7px;height:7px;border-radius:50%;
  background:#B5ED18;animation:liveblink 2s infinite;
}
@keyframes liveblink{0%,100%{opacity:1}50%{opacity:.2}}
.pv-bar-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.pv-bar-hint{font-size:11px;color:var(--muted);transition:color .3s}

/* browser mockup */
.browser-wrap{flex:1;padding:10px 12px 12px;display:flex;flex-direction:column;overflow:hidden}
.browser{
  flex:1;border:1.5px solid var(--border);border-radius:11px;
  overflow:hidden;display:flex;flex-direction:column;min-height:0;
  box-shadow:0 8px 32px var(--shadow);
  transition:border-color .3s;
}
.browser-chrome{
  flex-shrink:0;height:30px;padding:0 12px;
  background:var(--surface3);border-bottom:1.5px solid var(--border);
  display:flex;align-items:center;gap:7px;
  transition:background .3s,border-color .3s;
}
.bchrome-dot{width:10px;height:10px;border-radius:50%}
.bchrome-dot.r{background:#ff5f57}.bchrome-dot.y{background:#febc2e}.bchrome-dot.g{background:#28c840}
.bchrome-url{
  flex:1;margin:0 8px;height:18px;
  background:var(--surface2);border-radius:5px;
  font-size:10px;color:var(--muted);
  display:flex;align-items:center;padding:0 10px;
  transition:background .3s,color .3s;
}

/* scrollable wireframe */
.wf-scroll{flex:1;overflow-y:auto;background:var(--surface2);transition:background .3s}

/* ── WIREFRAME SECTIONS ── */
.wf-sec{
  position:relative;
  border-bottom:1.5px solid var(--border);
  transition:border-color .3s,background .2s;
}
/* section label */
.wf-sec::after{
  content:attr(data-name);
  position:absolute;top:5px;right:8px;
  font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;
  color:var(--muted);opacity:.5;
  transition:opacity .2s,color .2s;
  pointer-events:none;
}
/* highlighted state */
.wf-sec.hl{
  background:rgba(var(--hl-r,104),var(--hl-g,91),var(--hl-b,199),.05);
  border-bottom-color:rgba(var(--hl-r,104),var(--hl-g,91),var(--hl-b,199),.4);
  box-shadow:inset 3px 0 0 0 rgb(var(--hl-r,104),var(--hl-g,91),var(--hl-b,199));
}
.wf-sec.hl::after{opacity:1;color:rgb(var(--hl-r,104),var(--hl-g,91),var(--hl-b,199))}
/* empty = dim */
.wf-sec.dim{opacity:.3}

/* ── HEADER section ── */
.wf-header{
  height:40px;padding:0 14px;
  background:var(--surface);
  display:flex;align-items:center;justify-content:space-between;
  transition:background .3s;
}
.wf-logo{font-size:11px;font-weight:900;color:var(--text);transition:color .3s}
.wf-logo span{color:#685BC7}
.wf-nav-row{display:flex;gap:5px}
.wf-nav-item{
  font-size:9px;padding:2px 7px;border-radius:6px;
  border:1px solid var(--border);color:var(--muted);
  transition:border-color .3s,color .3s;
}
.wf-nav-item.first{color:#685BC7;border-color:rgba(104,91,199,.4)}
.wf-ph{height:7px;border-radius:3px;background:var(--border);transition:background .3s}

/* ── HERO section ── */
.wf-hero{
  padding:22px 14px 20px;
  position:relative;overflow:hidden;
  transition:background .3s;
}
[data-theme="dark"] .wf-hero{background:linear-gradient(150deg,#0f0c20,#141130)}
[data-theme="light"] .wf-hero{background:linear-gradient(150deg,#edeaff,#f5f2ff)}
.wf-hero-glow{
  position:absolute;top:-30px;left:50%;transform:translateX(-50%);
  width:160px;height:100px;
  background:radial-gradient(ellipse,rgba(104,91,199,.22),transparent 70%);
  pointer-events:none;
}
.wf-hero-tag{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:#B5ED18;margin-bottom:7px}
.wf-hero-title{font-size:16px;font-weight:900;color:var(--text);line-height:1.2;margin-bottom:5px;min-height:16px;transition:color .3s}
.wf-hero-sub{font-size:10px;color:var(--sub);line-height:1.5;margin-bottom:10px;min-height:12px;transition:color .3s}
.wf-hero-cta{display:inline-block;padding:6px 14px;border-radius:16px;background:linear-gradient(135deg,#685BC7,#8b5cf6);font-size:9px;font-weight:800;color:#fff}

/* ── ABOUT section ── */
.wf-about{
  padding:13px 14px;
  display:flex;gap:10px;
  background:var(--surface2);transition:background .3s;
}
.wf-ava{
  width:40px;height:40px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,rgba(104,91,199,.15),rgba(139,92,246,.1));
  border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:border-color .3s;
}
.wf-sec-label{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.wf-about-text{font-size:9.5px;color:var(--sub);line-height:1.6;transition:color .3s}

/* ── SKILLS section ── */
.wf-skills{padding:12px 14px;background:var(--surface);transition:background .3s}
.wf-skills-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.wf-skill-tag{
  padding:3px 10px;border-radius:16px;font-size:9px;font-weight:700;
  background:rgba(236,72,153,.08);border:1px solid rgba(236,72,153,.25);color:#ec4899;
}
.wf-skill-ph{height:18px;border-radius:9px;background:var(--border);transition:background .3s}

/* ── PROJECTS section ── */
.wf-projects{padding:12px 14px;background:var(--surface2);transition:background .3s}
.wf-proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.wf-proj-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;
  transition:background .3s,border-color .25s;
}
.wf-proj-card.ok{border-color:rgba(239,68,68,.25)}
.wf-proj-thumb{
  height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;
  background:linear-gradient(135deg,rgba(239,68,68,.08),rgba(239,68,68,.04));
  transition:background .3s;
}
.wf-proj-bd{padding:5px 8px}
.wf-proj-name{font-size:9px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .3s}
.wf-proj-desc{font-size:8px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .3s}
.wf-ph2{height:7px;border-radius:3px;background:var(--border);margin-bottom:3px;transition:background .3s}

/* ── STYLE section ── */
.wf-style{padding:12px 14px;background:var(--surface);transition:background .3s}
.wf-color-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:6px}
.wf-color-dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.18);flex-shrink:0}
.wf-style-tag{
  font-size:9px;padding:2px 8px;border-radius:10px;
  background:var(--surface3);border:1px solid var(--border);
  color:var(--sub);transition:background .3s,color .3s,border-color .3s;
}

/* ── CONTACTS section ── */
.wf-contacts{padding:12px 14px;background:var(--surface2);transition:background .3s}
.wf-ct-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.wf-ct-item{
  display:flex;align-items:center;gap:4px;font-size:9px;color:var(--sub);
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:3px 9px;
  transition:background .3s,border-color .3s,color .3s;
}

/* ── FOOTER ── */
.wf-footer{
  padding:9px 14px;text-align:center;
  font-size:9px;color:var(--muted);
  background:var(--surface);border-top:1px solid var(--border);
  transition:background .3s,color .3s,border-color .3s;
}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(104,91,199,.2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(104,91,199,.45)}

/* ══════════════════════════════════
   MODAL
══════════════════════════════════ */
.overlay{
  position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,.65);backdrop-filter:blur(16px);
  display:none;align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex}

.modal{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:20px 20px 0 0;
  width:100%;max-width:680px;max-height:88vh;
  display:flex;flex-direction:column;overflow:hidden;
  animation:mslide .28s cubic-bezier(.4,0,.2,1);
  box-shadow:0 -16px 56px var(--shadow);
  transition:background .3s,border-color .3s;
}
@keyframes mslide{from{transform:translateY(52px);opacity:0}to{transform:none;opacity:1}}

.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.modal-head{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:15px;font-weight:900;color:var(--text);display:flex;align-items:center;gap:8px;transition:color .3s}
.modal-x{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-x:hover{border-color:var(--red,#f04);color:var(--red,#f04)}

.modal-tabs{padding:12px 20px 0;display:flex;gap:6px;flex-shrink:0}
.mtab{flex:1;padding:9px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;border-radius:9px;transition:all .15s}
.mtab:hover{border-color:var(--border2);color:var(--text)}
.mtab.on{background:rgba(104,91,199,.1);border-color:#685BC7;color:var(--text)}

.modal-status{padding:7px 20px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:7px;flex-shrink:0}
.mdot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .2s}
.mdot.run{background:#B5ED18;animation:liveblink 1s infinite}
.mdot.ok{background:#B5ED18}.mdot.err{background:#f04}

.modal-body{flex:1;overflow-y:auto;padding:0 20px 14px}
.pout{
  background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;
  padding:16px;font-family:'SF Mono','Fira Code',monospace;font-size:12px;
  line-height:1.8;color:var(--sub);white-space:pre-wrap;word-break:break-word;
  min-height:150px;transition:background .3s,border-color .3s,color .3s;
}
.pout.streaming::after{content:'▋';color:#B5ED18;animation:blink .55s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.copy-btn{flex:1;padding:11px;border-radius:9px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.copy-btn:hover{border-color:#685BC7;color:var(--text)}
.copy-btn.done{background:rgba(181,237,24,.1);border-color:#B5ED18;color:#B5ED18}
.modal-gen-btn{padding:11px 24px;border-radius:9px;border:none;background:linear-gradient(135deg,#685BC7,#8b5cf6);color:#fff;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(104,91,199,.3);transition:transform .18s,box-shadow .18s}
.modal-gen-btn:hover{transform:translateY(-1px);box-shadow:0 7px 22px rgba(104,91,199,.45)}
.modal-gen-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header class="hdr">
  <div class="logo">
    <div class="logo-icon">AI</div>
    <span class="logo-name">AI <b>TREND</b></span>
  </div>
  <div class="hdr-prog">
    <div class="prog-pills" id="progPills"></div>
    <span class="prog-label" id="progLabel">0 / 8 блоков</span>
  </div>
  <button class="theme-btn" onclick="toggleTheme()">
    <div class="theme-ball"><span id="thIcon">🌙</span></div>
  </button>
  <button class="gen-btn" id="genBtn" onclick="openModal()">✨ Получить промпт</button>
</header>

<!-- ══ WORKSPACE ══ -->
<div class="workspace" id="workspace">

  <!-- LEFT: BLOCKS -->
  <div class="left-col" id="leftCol"></div>

  <!-- DIVIDER -->
  <div class="divider" id="divider">
    <div class="div-track"></div>
    <div class="div-pill">
      <button class="div-btn" onclick="snapTo(30)" title="Расширить превью">◀</button>
      <div class="div-dots"></div>
      <button class="div-btn" onclick="snapTo(70)" title="Расширить блоки">▶</button>
    </div>
  </div>

  <!-- RIGHT: WIREFRAME -->
  <div class="right-col">
    <div class="pv-bar">
      <div class="pv-bar-l">
        <div class="pv-live"></div>
        <span class="pv-bar-title">Структура сайта</span>
      </div>
      <span class="pv-bar-hint" id="pvHint">заполняй блоки слева →</span>
    </div>
    <div class="browser-wrap">
      <div class="browser">
        <div class="browser-chrome">
          <div class="bchrome-dot r"></div>
          <div class="bchrome-dot y"></div>
          <div class="bchrome-dot g"></div>
          <div class="bchrome-url" id="browserUrl">мой-сайт.ru</div>
        </div>
        <div class="wf-scroll" id="wfScroll"></div>
      </div>
    </div>
  </div>

</div>

<!-- ══ MODAL ══ -->
<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title">✨ Готовый промпт</div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-tabs">
      <button class="mtab on" id="tab-ru" onclick="setTab('ru')">🇷🇺 Русский</button>
      <button class="mtab"    id="tab-en" onclick="setTab('en')">🇬🇧 English</button>
    </div>
    <div class="modal-status">
      <div class="mdot" id="mdot"></div>
      <span id="mstatus">Нажми «Сгенерировать» — ИИ соберёт промпт из твоих описаний</span>
    </div>
    <div class="modal-body">
      <pre class="pout" id="pout">Заполни блоки слева и нажми ⚡ Сгенерировать</pre>
    </div>
    <div class="modal-foot">
      <button class="copy-btn" id="cpBtn" onclick="doCopy()">📋 Копировать</button>
      <button class="modal-gen-btn" id="mGenBtn" onclick="generate()">⚡ Сгенерировать</button>
    </div>
  </div>
</div>

<script>
/* ══ SECTION DEFINITIONS ══ */
const SECTIONS = [
  { id:'site',     num:1, icon:'🌟', name:'О сайте',
    color:'#685BC7', cr:'104,91,199',
    hlRGB:[104,91,199],
    tip:'Расскажи какой сайт ты хочешь создать и для кого',
    example:'Пример: «Портфолио для дизайнера Ани, 16 лет. Хочу показать работы и найти заказчиков»',
    ph:'Какой сайт, для кого, кто ты…' },
  { id:'header',   num:2, icon:'🏠', name:'Шапка',
    color:'#3b82f6', cr:'59,130,246',
    hlRGB:[59,130,246],
    tip:'Что будет в верхней части сайта',
    example:'Пример: «Логотип: "Аня Дизайн". Меню: Главная, Работы, Обо мне, Контакты»',
    ph:'Логотип: «…». Меню: Главная, Обо мне, Контакты…' },
  { id:'hero',     num:3, icon:'⚡', name:'Главный экран',
    color:'#f59e0b', cr:'245,158,11',
    hlRGB:[245,158,11],
    tip:'Первое, что видит посетитель — большой заголовок',
    example:'Пример: «Заголовок: "Привет! Я Аня." Подзаголовок про опыт. Кнопка "Смотреть работы"»',
    ph:'Заголовок: «…». Подзаголовок. Кнопка «…»…' },
  { id:'about',    num:4, icon:'👋', name:'Обо мне',
    color:'#22c55e', cr:'34,197,94',
    hlRGB:[34,197,94],
    tip:'2–3 предложения о себе',
    example:'Пример: «Меня зовут Аня, 16 лет, рисую в Procreate 2 года. Люблю создавать персонажей»',
    ph:'Расскажи о себе: кто ты, что умеешь…' },
  { id:'skills',   num:5, icon:'✨', name:'Навыки',
    color:'#ec4899', cr:'236,72,153',
    hlRGB:[236,72,153],
    tip:'Перечисли навыки или услуги через запятую',
    example:'Пример: «Figma, Illustrator, Procreate, CSS, Анимация, Рисование персонажей»',
    ph:'Figma, Illustrator, CSS, Анимация…' },
  { id:'projects', num:6, icon:'🖼️', name:'Работы / Проекты',
    color:'#ef4444', cr:'239,68,68',
    hlRGB:[239,68,68],
    tip:'Назови свои проекты — каждый с новой строки',
    example:'Пример: «1. Персонажи для игры\n2. Логотип кофейни\n3. Иллюстрация для книги»',
    ph:'1. Название — описание\n2. …\n3. …' },
  { id:'style',    num:7, icon:'🎨', name:'Стиль и цвета',
    color:'#a855f7', cr:'168,85,247',
    hlRGB:[168,85,247],
    tip:'Опиши как должен выглядеть сайт',
    example:'Пример: «Тёмный фон, акцент #B5ED18. Минимализм, много воздуха. Шрифт Inter»',
    ph:'Тёмный/светлый, любимые цвета (#hex), атмосфера…' },
  { id:'contacts', num:8, icon:'📬', name:'Контакты',
    color:'#06b6d4', cr:'6,182,212',
    hlRGB:[6,182,212],
    tip:'Как с тобой связаться',
    example:'Пример: «Email: me@mail.ru, Telegram: @me, Instagram: @me.art»',
    ph:'Email: …  Telegram: @…  Instagram: @…' },
];

/* ══ STATE ══ */
const D = {};
SECTIONS.forEach(s => D[s.id] = '');
let activeId = null, curTab = 'ru', lastRU = '', lastEN = '', gening = false;

/* ══ INIT ══ */
function init() {
  // progress pills
  document.getElementById('progPills').innerHTML =
    SECTIONS.map(s => `<div class="prog-pill" id="pp-${s.id}"></div>`).join('');

  // blocks
  document.getElementById('leftCol').innerHTML = SECTIONS.map((s, i) => `
    <div class="sblock" id="sb-${s.id}"
         style="--accent:${s.color};--acr:${s.cr}">
      <div class="sblock-strip" onclick="toggleBlock('${s.id}')">
        <div class="sblock-num" id="snum-${s.id}">${s.num}</div>
        <span class="sblock-icon">${s.icon}</span>
        <div class="sblock-info">
          <div class="sblock-name">${s.name}</div>
          <div class="sblock-preview" id="sprev-${s.id}">${s.tip}</div>
        </div>
        <div class="sblock-check" id="schk-${s.id}">✓</div>
        <span class="sblock-arr ${i===0?'open':''}" id="sarr-${s.id}">▼</span>
      </div>
      <div class="sblock-body ${i===0?'open':''}" id="sbody-${s.id}">
        <div class="sblock-tip">
          ${s.tip}
          <div class="sblock-example">${s.example}</div>
        </div>
        <textarea class="sblock-ta" id="ta-${s.id}"
          placeholder="${s.ph}"
          oninput="onInput('${s.id}', this.value)"
          onfocus="onFocus('${s.id}')"
          rows="4"></textarea>
      </div>
    </div>`).join('');

  renderWireframe();
}

function toggleBlock(id) {
  const body = document.getElementById('sbody-' + id);
  const arr  = document.getElementById('sarr-' + id);
  const open = body.classList.contains('open');
  body.classList.toggle('open', !open);
  arr.classList.toggle('open', !open);
}

/* ══ INPUT ══ */
function onInput(id, val) {
  D[id] = val;
  const has = val.trim() !== '';
  const block = document.getElementById('sb-' + id);
  block.classList.toggle('filled', has);

  // preview text in block header
  const prev = document.getElementById('sprev-' + id);
  const sec = SECTIONS.find(s => s.id === id);
  prev.textContent = has
    ? val.trim().substring(0, 50) + (val.length > 50 ? '…' : '')
    : sec.tip;

  // progress pills
  const n = SECTIONS.filter(s => D[s.id].trim()).length;
  SECTIONS.forEach(s => {
    const pill = document.getElementById('pp-' + s.id);
    if (!pill) return;
    if (D[s.id].trim()) pill.className = 'prog-pill done';
    else if (s.id === id) pill.className = 'prog-pill active';
    else pill.className = 'prog-pill';
  });
  document.getElementById('progLabel').textContent = n + ' / 8 блоков';

  // url
  const nm = extractName();
  if (nm) document.getElementById('browserUrl').textContent =
    nm.toLowerCase().replace(/\s+/g, '-') + '.ru';

  // hint
  const hint = document.getElementById('pvHint');
  hint.textContent = n === 0 ? 'заполняй блоки слева →'
    : n < 8 ? `${n} / 8 готово`
    : 'всё заполнено 🎉';

  renderWireframe();
}

function onFocus(id) {
  activeId = id;
  document.querySelectorAll('.sblock').forEach(el => el.classList.remove('active'));
  const block = document.getElementById('sb-' + id);
  if (block) block.classList.add('active');

  // highlight wireframe section
  highlightWF(id);
}

/* ══ WIREFRAME HIGHLIGHT ══ */
const WF_MAP = {
  site:     'wfs-header',
  header:   'wfs-header',
  hero:     'wfs-hero',
  about:    'wfs-about',
  skills:   'wfs-skills',
  projects: 'wfs-projects',
  style:    'wfs-style',
  contacts: 'wfs-contacts',
};

function highlightWF(id) {
  document.querySelectorAll('.wf-sec').forEach(el => el.classList.remove('hl'));
  const wfId = WF_MAP[id];
  if (!wfId) return;
  const el = document.getElementById(wfId);
  if (!el) return;
  const sec = SECTIONS.find(s => s.id === id);
  if (sec) {
    const [r,g,b] = sec.hlRGB;
    el.style.setProperty('--hl-r', r);
    el.style.setProperty('--hl-g', g);
    el.style.setProperty('--hl-b', b);
  }
  el.classList.add('hl');
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ══ EXTRACTORS ══ */
function has(id)   { return D[id].trim() !== ''; }
function esc(s)    { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function extractName() {
  const t = D.site + ' ' + D.header;
  const m = t.match(/(?:логотип|имя|зовут|name)[:\s«"']+([^\s,»"'\n.]{2,20})/i);
  if (m) return m[1].trim();
  const p = (D.site || D.header || '').match(/\b([А-ЯA-Z][а-яёa-z]{2,14})/);
  return p ? p[1] : '';
}
function xLogo() {
  const m = D.header.match(/логотип[:\s«"']+([^»"'\n,!?]{2,22})/i);
  return m ? m[1].trim() : extractName().substring(0, 18);
}
function xNav() {
  const m = D.header.match(/меню[:\s]+(.+?)(?:\n|$)/i);
  if (m) return m[1].split(/[,;]/).map(s=>s.trim()).filter(Boolean).slice(0,5);
  const h = D.header.match(/(?:главная|обо мне|контакты|проекты|услуги|портфолио|блог|работы|галерея)/gi);
  return h ? [...new Set(h.map(s=>s[0].toUpperCase()+s.slice(1)))].slice(0,5) : [];
}
function xHeroTitle() {
  const t = D.hero; if(!t) return '';
  const q = t.match(/[«""]([^»""]{4,52})[»""]/); if(q) return q[1];
  return t.split(/[.!?\n]/)[0].replace(/^заголовок[:\s]*/i,'').trim().substring(0,52);
}
function xHeroSub() {
  const p = D.hero.split(/[.!?\n]/).map(s=>s.trim()).filter(Boolean);
  return p[1] ? p[1].replace(/^(?:подзаголовок|слоган)[:\s]*/i,'').trim().substring(0,70) : '';
}
function xHeroBtn() {
  const m = D.hero.match(/кнопка[:\s«"']+([^»"'\n,!?]{2,22})/i);
  return m ? m[1].trim() : '';
}
function xSkills() {
  return D.skills
    ? D.skills.split(/[\n,;\/]+/).map(s=>s.replace(/^\d+[.)]\s*/,'').trim()).filter(s=>s.length>1&&s.length<28).slice(0,10)
    : [];
}
function xProjects() {
  if (!D.projects) return [];
  const l = D.projects.split('\n').map(s=>s.replace(/^\d+[.):\-]\s*/,'').trim()).filter(s=>s.length>2);
  return l.length >= 2 ? l.slice(0,4) : D.projects.split(/[,;]/).map(s=>s.trim()).filter(s=>s.length>2).slice(0,4);
}
function xColors()  { return (D.style.match(/#[0-9A-Fa-f]{3,6}/g)||[]).slice(0,5); }
function xTheme()   { const t=D.style; return /тёмн|dark/i.test(t)?'Тёмная':/светл|light/i.test(t)?'Светлая':/пастель/i.test(t)?'Пастель':''; }
function xFont()    { const m=D.style.match(/шрифт[:\s]+([A-Za-zА-Яа-я ]+?)(?:[,.\n]|$)/i); return m?m[1].trim().substring(0,16):''; }
function xContacts() {
  const t = D.contacts; if(!t) return [];
  const r=[];
  const e=t.match(/[\w.+-]+@[\w.-]+\.\w+/); if(e)r.push({i:'📧',v:e[0]});
  const tg=t.match(/@([\w]+)/); if(tg)r.push({i:'✈️',v:'@'+tg[1]});
  const gh=t.match(/github\.com\/([\w-]+)/i); if(gh)r.push({i:'🐙',v:'GitHub/'+gh[1]});
  if(!r.length&&t.trim()) r.push({i:'📬',v:t.split(/[\n,]/)[0].trim().substring(0,28)});
  return r.slice(0,4);
}

/* ══ RENDER WIREFRAME ══ */
const PROJ_EMJ = ['🚀','💡','🎯','⚡'];

function renderWireframe() {
  const logo  = xLogo(), nav = xNav();
  const ht    = xHeroTitle(), hs = xHeroSub(), hb = xHeroBtn();
  const skills= xSkills(), projs = xProjects();
  const colors= xColors(), theme = xTheme(), font = xFont();
  const cts   = xContacts();
  const name  = extractName() || 'Мой сайт';

  /* HEADER */
  const logoH = has('header') && logo
    ? `<div class="wf-logo">${esc(logo.replace(/ai.?trend/i,'AI <span>TREND</span>'))}</div>`
    : `<div class="wf-ph" style="width:50px"></div>`;
  const navH = has('header') && nav.length
    ? nav.map((n,i)=>`<div class="wf-nav-item${i===0?' first':''}">${esc(n)}</div>`).join('')
    : `<div class="wf-ph" style="width:100px"></div>`;

  /* HERO */
  let heroInner;
  if (has('hero')) {
    heroInner = `<div class="wf-hero-glow"></div>
      <div class="wf-hero-tag">✦ ${esc(name)}</div>
      <div class="wf-hero-title">${esc(ht || 'Привет!')}</div>
      ${hs ? `<div class="wf-hero-sub">${esc(hs)}</div>` : ''}
      <div class="wf-hero-cta">${esc(hb || 'Узнать больше')}</div>`;
  } else {
    heroInner = `<div class="wf-hero-glow"></div>
      <div class="wf-ph" style="width:72%;height:13px;margin-bottom:7px"></div>
      <div class="wf-ph" style="width:54%;opacity:.5;margin-bottom:9px"></div>
      <div class="wf-ph" style="width:68px;height:20px;border-radius:10px;opacity:.35"></div>`;
  }

  /* ABOUT */
  const aboutTxt = D.about.trim().substring(0,110) + (D.about.length>110?'…':'');

  /* SKILLS */
  const skillsH = has('skills') && skills.length
    ? skills.map(s=>`<div class="wf-skill-tag">${esc(s)}</div>`).join('')
    : [44,58,36,50,64,40].map(w=>`<div class="wf-skill-ph" style="width:${w}px;height:18px;border-radius:9px"></div>`).join('');

  /* PROJECTS */
  const projsH = has('projects') && projs.length
    ? projs.map((p,i)=>{
        const parts = p.split(/[—–\-]/);
        const nm = parts[0].trim().substring(0,20);
        const ds = parts[1]?.trim().substring(0,24)||'';
        return `<div class="wf-proj-card ok">
          <div class="wf-proj-thumb">${PROJ_EMJ[i]||'📁'}</div>
          <div class="wf-proj-bd">
            <div class="wf-proj-name">${esc(nm)}</div>
            ${ds?`<div class="wf-proj-desc">${esc(ds)}</div>`:''}
          </div></div>`;
      }).join('')
    : [0,1,2,3].map(()=>`<div class="wf-proj-card">
        <div class="wf-proj-thumb" style="opacity:.2"></div>
        <div class="wf-proj-bd">
          <div class="wf-ph2" style="width:65%"></div>
          <div class="wf-ph2" style="width:44%;opacity:.6"></div>
        </div></div>`).join('');

  /* STYLE */
  const showColors = colors.length ? colors : (has('style') ? ['#685BC7','#B5ED18'] : []);
  const colorsH = showColors.map(c=>`<div class="wf-color-dot" style="background:${c}"></div>`).join('');

  /* CONTACTS */
  const ctsH = has('contacts') && cts.length
    ? cts.map(c=>`<div class="wf-ct-item">${c.i} ${esc(c.v)}</div>`).join('')
    : `<div class="wf-ct-item">📧 email</div><div class="wf-ct-item">✈️ @user</div>`;

  document.getElementById('wfScroll').innerHTML = `
    <div class="wf-sec ${has('header')?'':'dim'}" id="wfs-header" data-name="шапка">
      <div class="wf-header">${logoH}<div class="wf-nav-row">${navH}</div></div>
    </div>

    <div class="wf-sec ${has('hero')?'':'dim'}" id="wfs-hero" data-name="hero">
      <div class="wf-hero">${heroInner}</div>
    </div>

    <div class="wf-sec ${has('about')?'':'dim'}" id="wfs-about" data-name="обо мне">
      <div class="wf-about">
        <div class="wf-ava">${has('about')?'👤':'?'}</div>
        <div>
          <div class="wf-sec-label" style="color:#86efac">👋 Обо мне</div>
          <div class="wf-about-text">${has('about')?esc(aboutTxt):'— напиши о себе —'}</div>
        </div>
      </div>
    </div>

    <div class="wf-sec ${has('skills')?'':'dim'}" id="wfs-skills" data-name="навыки">
      <div class="wf-skills">
        <div class="wf-sec-label" style="color:#f9a8d4">✨ Навыки</div>
        <div class="wf-skills-row">${skillsH}</div>
      </div>
    </div>

    <div class="wf-sec ${has('projects')?'':'dim'}" id="wfs-projects" data-name="работы">
      <div class="wf-projects">
        <div class="wf-sec-label" style="color:#fca5a5">🖼️ Работы</div>
        <div class="wf-proj-grid">${projsH}</div>
      </div>
    </div>

    <div class="wf-sec ${has('style')?'':'dim'}" id="wfs-style" data-name="стиль">
      <div class="wf-style">
        <div class="wf-sec-label" style="color:#d8b4fe">🎨 Стиль</div>
        <div class="wf-color-row">
          ${colorsH}
          ${theme?`<div class="wf-style-tag">${theme}</div>`:''}
          ${font?`<div class="wf-style-tag">${esc(font)}</div>`:''}
          ${!has('style')?'<span style="font-size:9px;color:var(--muted)">опиши стиль →</span>':''}
        </div>
      </div>
    </div>

    <div class="wf-sec ${has('contacts')?'':'dim'}" id="wfs-contacts" data-name="контакты">
      <div class="wf-contacts">
        <div class="wf-sec-label" style="color:#67e8f9">📬 Контакты</div>
        <div class="wf-ct-row">${ctsH}</div>
      </div>
    </div>

    <div class="wf-footer">© 2025 ${esc(name)} · AI TREND ⚡</div>
  `;

  if (activeId) highlightWF(activeId);
}

/* ══ DRAG DIVIDER ══ */
const divider = document.getElementById('divider');
const leftCol = document.getElementById('leftCol');
const wsEl    = document.getElementById('workspace');
let dragOn = false, dragX0 = 0, dragW0 = 0;

divider.addEventListener('pointerdown', e => {
  dragOn = true; dragX0 = e.clientX; dragW0 = leftCol.offsetWidth;
  divider.setPointerCapture(e.pointerId);
  divider.classList.add('dragging');
  leftCol.style.transition = 'none';
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
divider.addEventListener('pointermove', e => {
  if (!dragOn) return;
  const total = wsEl.offsetWidth;
  const w = Math.max(220, Math.min(total - 200, dragW0 + e.clientX - dragX0));
  leftCol.style.width = w + 'px';
});
divider.addEventListener('pointerup', () => {
  if (!dragOn) return;
  dragOn = false;
  divider.classList.remove('dragging');
  leftCol.style.transition = '';
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  // soft snap
  const pct = leftCol.offsetWidth / wsEl.offsetWidth * 100;
  if (pct < 33) snapTo(28);
  else if (pct > 67) snapTo(72);
});
divider.addEventListener('dblclick', () => snapTo(50));

function snapTo(pct) {
  leftCol.style.transition = 'width .3s cubic-bezier(.4,0,.2,1)';
  leftCol.style.width = pct + '%';
  setTimeout(() => leftCol.style.transition = '', 340);
}

/* ══ THEME ══ */
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('thIcon').textContent = next === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('aitrend_theme', next);
}
(() => {
  const t = localStorage.getItem('aitrend_theme');
  if (t) {
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('thIcon').textContent = t === 'dark' ? '🌙' : '☀️';
  }
})();

/* ══ MODAL ══ */
function openModal()  { document.getElementById('overlay').classList.add('open'); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function bgClose(e)   { if (e.target === document.getElementById('overlay')) closeModal(); }

function setTab(t) {
  curTab = t;
  document.getElementById('tab-ru').classList.toggle('on', t === 'ru');
  document.getElementById('tab-en').classList.toggle('on', t === 'en');
  const po = document.getElementById('pout');
  if (t === 'ru' && lastRU) po.textContent = lastRU;
  else if (t === 'en' && lastEN) po.textContent = lastEN;
  else if (!gening) po.textContent = 'Нажми «Сгенерировать» ⚡';
}

/* ══ GENERATE ══ */
function getKey() { return localStorage.getItem('oai_key') || ''; }
function setKey(k) { if (k) localStorage.setItem('oai_key', k.trim()); }

async function generate() {
  if (gening) return;
  const filled = SECTIONS.filter(s => D[s.id].trim());
  if (!filled.length) { setStat('err', 'Заполни хотя бы один блок!'); return; }
  let key = getKey();
  if (!key) {
    key = prompt('Введи OpenAI API ключ (сохранится в браузере):');
    if (!key?.trim()) { setStat('err', 'Нужен API ключ'); return; }
    setKey(key);
  }
  gening = true;
  const btn = document.getElementById('mGenBtn');
  btn.disabled = true; btn.textContent = '⏳ Генерирую…';
  document.getElementById('genBtn').disabled = true;
  const po = document.getElementById('pout');
  po.classList.add('streaming'); po.textContent = '';
  setStat('run', 'ИИ собирает промпт из твоих описаний…');

  const blocks = SECTIONS.filter(s => D[s.id].trim())
    .map(s => `[${s.name.toUpperCase()}]\n${D[s.id]}`).join('\n\n');

  const sysRU = `Ты — профессиональный промпт-инженер. Пользователь описал разделы сайта. Создай один идеальный промпт для ИИ-разработчика, который по нему сделает красивый сайт HTML+CSS. Начало: «Ты — опытный веб-разработчик». Структура через ━━━ РАЗДЕЛ ━━━. В конце: ТЕХНИЧЕСКИЕ ТРЕБОВАНИЯ. Только промпт. Язык: русский.`;
  const sysEN = `You are a professional prompt engineer. Create one perfect prompt for an AI to build a beautiful HTML+CSS website. Start: "You are an experienced web developer". Use ━━━ SECTION ━━━. End with TECHNICAL REQUIREMENTS. Only the prompt. Language: English.`;

  try {
    if (curTab === 'ru') {
      lastRU = await streamGPT(sysRU, blocks, po, key);
      setStat('run', 'Генерирую английский вариант…');
      lastEN = await streamGPT(sysEN, blocks, null, key);
    } else {
      lastEN = await streamGPT(sysEN, blocks, po, key);
      setStat('run', 'Generating Russian version…');
      lastRU = await streamGPT(sysRU, blocks, null, key);
    }
    po.classList.remove('streaming');
    po.textContent = curTab === 'ru' ? lastRU : lastEN;
    setStat('ok', 'Готово 🎉 Копируй и вставляй в ChatGPT или Claude');
  } catch (e) {
    po.classList.remove('streaming');
    po.textContent = '❌ Ошибка: ' + e.message;
    setStat('err', 'Ошибка генерации');
  }
  gening = false;
  btn.disabled = false; btn.textContent = '🔄 Обновить';
  document.getElementById('genBtn').disabled = false;
}

async function streamGPT(sys, user, el, key) {
  const r = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+key },
    body: JSON.stringify({
      model: 'gpt-4o-mini', stream: true, temperature: .7, max_tokens: 1300,
      messages: [
        { role:'system', content: sys },
        { role:'user',   content: `Описания разделов:\n\n${user}\n\nСоздай промпт.` }
      ]
    })
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || r.statusText); }
  const reader = r.body.getReader(), dec = new TextDecoder();
  let full = '';
  while (true) {
    const { done, value } = await reader.read(); if (done) break;
    for (const line of dec.decode(value).split('\n')) {
      if (!line.startsWith('data:')) continue;
      const d = line.slice(5).trim(); if (d === '[DONE]') break;
      try {
        const tok = JSON.parse(d).choices?.[0]?.delta?.content || '';
        full += tok;
        if (el) { el.textContent = full; el.scrollTop = el.scrollHeight; }
      } catch {}
    }
  }
  return full;
}

function setStat(t, m) {
  document.getElementById('mdot').className = 'mdot ' + t;
  document.getElementById('mstatus').textContent = m;
}

function doCopy() {
  const txt = curTab === 'ru' ? lastRU : lastEN;
  if (!txt) { setStat('err', 'Сначала нажми «Сгенерировать» ⚡'); return; }
  navigator.clipboard.writeText(txt).then(() => {
    const b = document.getElementById('cpBtn');
    b.textContent = '✅ Скопировано!'; b.classList.add('done');
    setTimeout(() => { b.textContent = '📋 Копировать'; b.classList.remove('done'); }, 2500);
  });
}

/* ══ BOOT ══ */
init();
</script>
